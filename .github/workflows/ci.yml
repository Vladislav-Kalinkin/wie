name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Code Quality & Tests (Apple Silicon)
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy (Linter)
        run: cargo clippy --all-targets -- -D warnings

      - name: Run test suite (Apple Silicon JIT Matrix)
        run: |
          WIE_MEM=hybrid WIE_JIT_MEM=sticky cargo test --workspace

          WIE_MEM=hybrid WIE_JIT_MEM=pin WIE_JIT_CHAIN=1 WIE_STRING_BULK=1 cargo test --workspace
